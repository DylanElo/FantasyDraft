<!-- @dsCard group="Spacing" viewport="700x170" name="Radius + Plates" subtitle="Chunky corners and the sticker-bevel elevation system" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<style>body{padding:20px;background:var(--surface-app);display:flex;gap:14px;align-items:center;}
.r{width:92px;height:92px;background:var(--ink-700);border:2px solid var(--ink-950);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-family:var(--font-mono);font-size:9px;color:var(--text-on-dark-muted);}</style></head><body>
<div class="r" style="border-radius:var(--r-xs)">xs 8</div>
<div class="r" style="border-radius:var(--r-sm)">sm 12</div>
<div class="r" style="border-radius:var(--r-md);box-shadow:var(--bevel-plate),0 3px 0 var(--ink-950)">md + bevel</div>
<div class="r" style="border-radius:var(--r-lg);box-shadow:var(--shadow-md)">lg + shadow</div>
<div class="r" style="border-radius:var(--r-xl);box-shadow:var(--shadow-inset-well)">xl + well</div>
<div class="r" style="border-radius:var(--r-pill);width:130px;height:44px;padding-bottom:0;align-items:center;">pill</div>
</body></html>
