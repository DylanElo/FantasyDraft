<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.shadow-cell { flex:1; padding:18px 12px; border-radius:14px; background:#0e0e26; border:1px solid var(--jjk-border); text-align:center; }
.shadow-cell .demo { width:64px; height:64px; margin:0 auto 10px; border-radius:14px; }
.shadow-cell .name { font-size:11px; font-weight:700; color:#f0f0ff; }
.shadow-cell .meta { font-family:var(--jjk-font-mono); font-size:9px; color:var(--jjk-muted); margin-top:4px; line-height:1.4; }
</style>
</head><body>
<div class="card">
  <div class="row" style="gap:10px">
    <div class="shadow-cell">
      <div class="demo" style="background:#7c3aed;box-shadow:0 8px 32px rgba(124,58,237,0.35)"></div>
      <div class="name">CTA aura</div>
      <div class="meta">0 8 32 purple/35</div>
    </div>
    <div class="shadow-cell">
      <div class="demo" style="background:#7c3aed;box-shadow:0 0 50px rgba(124,58,237,0.35), 0 8px 30px rgba(0,0,0,0.5)"></div>
      <div class="name">Logo glow</div>
      <div class="meta">0 0 50 purple +<br>0 8 30 black/50</div>
    </div>
    <div class="shadow-cell">
      <div class="demo" style="background:#22c55e;border-radius:50%;width:32px;height:32px;margin-top:26px;box-shadow:0 0 12px rgba(34,197,94,0.55)"></div>
      <div class="name">Orb glow</div>
      <div class="meta">0 0 5–14 &lt;color&gt;/55</div>
    </div>
    <div class="shadow-cell">
      <div class="demo" style="background:#161630;border:1px solid rgba(255,255,255,0.08);box-shadow:0 16px 56px rgba(124,58,237,0.12), inset 0 1px 0 rgba(255,255,255,0.04)"></div>
      <div class="name">Card lift</div>
      <div class="meta">0 16 56 purple/12<br>+ inset hilite</div>
    </div>
    <div class="shadow-cell">
      <div class="demo" style="background:#0e0e26;border:1px solid rgba(245,158,11,0.42);box-shadow:0 0 20px rgba(245,158,11,0.07)"></div>
      <div class="name">Winner halo</div>
      <div class="meta">0 0 20 gold/7</div>
    </div>
  </div>
</div></body></html>
