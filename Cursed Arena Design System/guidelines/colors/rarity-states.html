<!-- @dsCard group="Colors" viewport="700x180" name="Rarity + Combat States" subtitle="Rarity frames and strict combat-state color rules" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<style>body{display:flex;flex-direction:column;gap:12px;padding:16px;background:var(--surface-app);}
.row{display:flex;gap:10px;}
.chip{flex:1;height:56px;border-radius:var(--r-sm);background:var(--ink-800);display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-weight:800;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-on-dark-dim);}</style></head><body>
<div class="row">
<div class="chip" style="border:3px solid var(--rar-common)">Common</div>
<div class="chip" style="border:3px solid var(--rar-rare)">Rare</div>
<div class="chip" style="border:3px solid var(--rar-epic)">Epic</div>
<div class="chip" style="border:3px solid var(--rar-legendary);box-shadow:var(--aura-gold)">Legendary</div>
</div>
<div class="row">
<div class="chip" style="border:3px solid var(--gold-400);color:var(--gold-300)">Selected · Gold</div>
<div class="chip" style="border:3px solid var(--teal-400);color:var(--teal-400)">Legal Target · Teal</div>
<div class="chip" style="border:3px solid var(--red-500);color:var(--red-400)">Enemy Threat · Red</div>
<div class="chip" style="border:3px solid var(--curse-400);color:var(--curse-300)">Domain · Violet</div>
</div>
</body></html>
