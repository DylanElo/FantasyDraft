name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'jjk_bot/characters.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate character data files from characters.py
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, '.')
          from jjk_bot.characters import CHARACTERS
          data = []
          for char in CHARACTERS:
              data.append({
                  'name': char.name,
                  'description': char.description,
                  'image_url': char.image_url,
                  'skills': [
                      {
                          'name': s.name,
                          'description': s.description,
                          'cooldown': s.cooldown,
                          'energy': s.energy,
                          'classes': s.classes
                      }
                      for s in char.skills
                  ]
              })
          with open('docs/characters.json', 'w') as f:
              json.dump(data, f, indent=2)
          with open('docs/characters_data.js', 'w') as f:
              f.write('const CHARACTERS_DATA = ')
              json.dump(data, f)
              f.write(';')
          print(f'Exported {len(data)} characters')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
