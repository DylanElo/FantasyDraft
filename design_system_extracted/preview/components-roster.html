<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.mini-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.mini-card { background:#161630; border-radius:10px; overflow:hidden; border:1px solid var(--jjk-border); }
.mini-art { aspect-ratio:1; background:center top/cover no-repeat #07071a; }
.mini-name { padding:5px 7px; font-size:10px; font-weight:700; text-align:center; line-height:1.3; }
.mini-empty { background:#161630; border:1.5px dashed rgba(255,255,255,0.06); border-radius:10px; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:#3a3a5c; font-size:10px; }
.mini-empty-plus { font-size:22px; opacity:0.3; }
</style>
</head><body>
<div class="card">
  <div class="mini-grid">
    <div class="mini-card">
      <div class="mini-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/e/ef/Satoru_Gojo_%28Anime_2%29.png/revision/latest?cb=20250726003655')"></div>
      <div class="mini-name">Gojo</div>
    </div>
    <div class="mini-card">
      <div class="mini-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/3/35/Yuji_Itadori_%28Anime_4%29.png/revision/latest?cb=20251230155050')"></div>
      <div class="mini-name">Yuji</div>
    </div>
    <div class="mini-card">
      <div class="mini-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/6/6e/Megumi_Fushiguro_%28Anime_4%29.png/revision/latest?cb=20251230155327')"></div>
      <div class="mini-name">Megumi</div>
    </div>
    <div class="mini-empty"><div class="mini-empty-plus">+</div>Slot 4</div>
    <div class="mini-empty"><div class="mini-empty-plus">+</div>Slot 5</div>
  </div>
</div></body></html>
