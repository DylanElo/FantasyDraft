<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="bg-glow" style="background:#7c3aed;width:280px;height:280px;top:-100px;right:-80px;opacity:0.18"></div>
  <div class="row">
    <div class="swatch" style="background:#5b21b6">
      <div class="top"><span class="name">purple-lo</span><span class="hex">#5b21b6</span></div>
      <div class="role">Press / pressed CTA</div>
    </div>
    <div class="swatch" style="background:#7c3aed;box-shadow:0 8px 32px rgba(124,58,237,0.35)">
      <div class="top"><span class="name">purple</span><span class="hex">#7c3aed</span></div>
      <div class="role" style="color:rgba(255,255,255,0.85)">Brand primary — CTA, selection</div>
    </div>
    <div class="swatch" style="background:#a855f7">
      <div class="top"><span class="name">purple-hi</span><span class="hex">#a855f7</span></div>
      <div class="role" style="color:rgba(255,255,255,0.85)">Hover / active text accent</div>
    </div>
    <div class="swatch" style="background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.4);box-shadow:0 0 14px rgba(124,58,237,0.22)">
      <div class="top"><span class="name" style="color:#a855f7">purple-tint</span><span class="hex" style="color:#a855f7">12%</span></div>
      <div class="role" style="color:#a855f7">Active pill / chip bg</div>
    </div>
  </div>
</div></body></html>
