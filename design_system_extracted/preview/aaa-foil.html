<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.foil-demo {
  width: 220px; height: 300px; border-radius: 18px; overflow: hidden;
  background: linear-gradient(150deg, #1a0a36, #07071a);
  border: 1.5px solid rgba(124,58,237,0.5);
  position: relative; flex-shrink: 0;
  box-shadow: 0 18px 50px rgba(124,58,237,0.18);
}
.foil-demo::before {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(105deg,
      transparent 25%,
      rgba(255,255,255,0.22) 38%,
      rgba(168,85,247,0.45) 50%,
      rgba(34,211,238,0.22) 62%,
      transparent 75%
    );
  mix-blend-mode: color-dodge;
  animation: foilSweep 3.6s linear infinite;
}
@keyframes foilSweep {
  0%   { transform: translateX(-30%); }
  100% { transform: translateX(30%); }
}
.foil-demo::after {
  content: '呪'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel',serif; font-size: 96px; color: rgba(168,85,247,0.55);
  text-shadow: 0 0 30px rgba(168,85,247,0.4);
}
</style>
</head><body>
<div class="card" style="padding:24px 32px">
  <div class="row" style="gap:24px;align-items:center">
    <div class="foil-demo"></div>
    <div style="flex:1">
      <div style="font-family:'Cinzel',serif;font-weight:900;font-size:16px;color:#f0f0ff">Holographic foil</div>
      <div style="font-size:11px;color:#6b7094;line-height:1.6;margin-top:8px">
        105° linear gradient: white&nbsp;→ purple&nbsp;→ cyan, layered with <code style="background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:3px;font-family:var(--jjk-font-mono)">mix-blend-mode: color-dodge</code>.
        In the UI kit the angle tracks the cursor so the sheen always faces the light.
        <div style="font-family:var(--jjk-font-mono);font-size:10px;color:#3a3a5c;margin-top:6px">opacity 0 → 0.9 on hover · transition 400ms ease</div>
      </div>
    </div>
  </div>
</div></body></html>
