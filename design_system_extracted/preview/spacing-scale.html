<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.sp-row { display:flex; align-items:center; gap:14px; padding:6px 0; border-bottom:1px solid var(--jjk-border); }
.sp-row:last-child { border-bottom:none; }
.sp-bar { background:#7c3aed; height:12px; border-radius:3px; }
.sp-name { font-size:11px; font-weight:700; color:#f0f0ff; width:50px; }
.sp-meta { font-family: var(--jjk-font-mono); font-size:10px; color: var(--jjk-muted); flex:1; }
</style>
</head><body>
<div class="card" style="padding:18px 32px">
  <div class="sp-row"><div class="sp-name">sp-2</div><div class="sp-bar" style="width:4px"></div><div class="sp-meta">4px · orb gap, pip gap</div></div>
  <div class="sp-row"><div class="sp-name">sp-4</div><div class="sp-bar" style="width:8px"></div><div class="sp-meta">8px · header element gap</div></div>
  <div class="sp-row"><div class="sp-name">sp-6</div><div class="sp-bar" style="width:12px"></div><div class="sp-meta">12px · turn‑bar gap, panel grid gap</div></div>
  <div class="sp-row"><div class="sp-name">sp-7</div><div class="sp-bar" style="width:14px"></div><div class="sp-meta">14px · page gutter, char‑card padding</div></div>
  <div class="sp-row"><div class="sp-name">sp-9</div><div class="sp-bar" style="width:20px"></div><div class="sp-meta">20px · setup form vertical gap</div></div>
  <div class="sp-row"><div class="sp-name">sp-10</div><div class="sp-bar" style="width:24px"></div><div class="sp-meta">24px · setup horizontal padding</div></div>
  <div class="sp-row"><div class="sp-name">sp-14</div><div class="sp-bar" style="width:36px"></div><div class="sp-meta">36px · major‑block gap</div></div>
  <div class="sp-row"><div class="sp-name">sp-16</div><div class="sp-bar" style="width:56px"></div><div class="sp-meta">56px · hero top padding, header height</div></div>
</div></body></html>
