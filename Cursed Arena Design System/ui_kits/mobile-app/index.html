<!-- @dsCard group="Mobile App" viewport="390x844" name="Cursed Arena — Mobile Game" subtitle="Interactive click-through: Lobby → Team → Combat → Queue → Results" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cursed Arena — Mobile UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="mock-data.js"></script>
<style>
  html, body { height: 100%; margin: 0; background: #060410; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { transform-origin: center center; }
  @keyframes ca-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(56,217,190,0.5); } 50% { box-shadow: 0 0 0 8px rgba(56,217,190,0); } }
</style>
</head>
<body>
<div id="stage"><div id="canvas"><div id="root"></div></div></div>
<script>
  (function fit() {
    const W = 390, H = 844;
    function resize() {
      const s = Math.min(window.innerWidth / (W + 24), window.innerHeight / (H + 24), 1);
      document.getElementById('canvas').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', resize);
    resize();
  })();
</script>
<script>
  /* Load-order guard: fetch the design-system bundle (with retry), and only
     then load + transform the Babel screens so a slow/missing bundle never
     leaves a blank screen. */
  (function boot(attempt) {
    var s = document.createElement('script');
    s.src = '../../_ds_bundle.js' + (attempt ? '?retry=' + attempt : '');
    s.onload = function () {
      ['Screens.jsx', 'App.jsx'].reduce(function (p, src) {
        return p.then(function () {
          return fetch(src).then(function (r) { return r.text(); }).then(function (code) {
            var out = Babel.transform(code, { presets: ['react'] }).code;
            (new Function(out))();
          });
        });
      }, Promise.resolve()).then(function () {
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.CAApp));
      }).catch(function (e) {
        document.getElementById('root').innerHTML = '<p style="color:#C3B9D2;font-family:sans-serif;padding:24px">Failed to start: ' + e.message + '</p>';
      });
    };
    s.onerror = function () {
      if (attempt < 10) { setTimeout(function () { boot(attempt + 1); }, 700); }
      else { document.getElementById('root').innerHTML = '<p style="color:#C3B9D2;font-family:sans-serif;padding:24px">Design-system bundle not available yet — reload the page.</p>'; }
    };
    document.head.appendChild(s);
  })(0);
</script>
</body>
</html>
