<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px">
    <div class="swatch" style="border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#60a5fa">Tokyo</span><span class="hex" style="color:#60a5fa">#3b82f6</span></div>
      <div class="role" style="color:#60a5fa">Tokyo Jujutsu High</div>
    </div>
    <div class="swatch" style="border-color:rgba(6,182,212,0.5);background:rgba(6,182,212,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#22d3ee">Kyoto</span><span class="hex" style="color:#22d3ee">#06b6d4</span></div>
      <div class="role" style="color:#22d3ee">Kyoto Jujutsu High</div>
    </div>
    <div class="swatch" style="border-color:rgba(139,92,246,0.5);background:rgba(139,92,246,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#c084fc">Sorcerer</span><span class="hex" style="color:#c084fc">#8b5cf6</span></div>
      <div class="role" style="color:#c084fc">Other sorcerers</div>
    </div>
    <div class="swatch" style="border-color:rgba(239,68,68,0.5);background:rgba(239,68,68,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#f87171">Villain</span><span class="hex" style="color:#f87171">#ef4444</span></div>
      <div class="role" style="color:#f87171">Human antagonists</div>
    </div>
    <div class="swatch" style="border-color:rgba(220,38,38,0.5);background:rgba(220,38,38,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#f87171">Curse</span><span class="hex" style="color:#f87171">#dc2626</span></div>
      <div class="role" style="color:#f87171">Cursed spirits</div>
    </div>
    <div class="swatch" style="border-color:rgba(245,158,11,0.5);background:rgba(245,158,11,0.06);min-height:78px">
      <div class="top"><span class="name" style="color:#fbbf24">Culling</span><span class="hex" style="color:#fbbf24">#f59e0b</span></div>
      <div class="role" style="color:#fbbf24">Culling Game players</div>
    </div>
  </div>
</div></body></html>
