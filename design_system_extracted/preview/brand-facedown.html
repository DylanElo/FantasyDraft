<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.face-down {
  width: 200px; aspect-ratio: 3/4; flex-shrink:0;
  background: linear-gradient(150deg, #0e0624 0%, #1a0a36 50%, #0e0624 100%);
  border: 2px solid rgba(124,58,237,0.32);
  border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  box-shadow: 0 16px 56px rgba(124,58,237,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative; overflow: hidden;
}
.face-down::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(124,58,237,0.035) 18px, rgba(124,58,237,0.035) 36px);
}
.face-kanji { font-size: 64px; color: rgba(124,58,237,0.48); font-family:'Cinzel',serif; position:relative; z-index:1; }
.face-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: rgba(124,58,237,0.65); position:relative; z-index:1; }
</style>
</head><body>
<div class="card" style="padding:18px 32px">
  <div class="row" style="gap:24px;align-items:center">
    <div class="face-down">
      <div class="face-kanji">呪</div>
      <div class="face-label">TAP TO DRAW</div>
    </div>
    <div style="flex:1">
      <div style="font-family:'Cinzel',serif;font-weight:900;font-size:18px;color:#f0f0ff">The talisman card back</div>
      <div style="font-size:12px;color:#6b7094;line-height:1.6;margin-top:8px">
        Diagonal hairline weave at 3.5% α • 64–82px 呪 kanji at 48% purple, floats ±10px (3.2s loop) • micro‑label tracked +3px in low‑contrast purple.
        <div style="margin-top:6px;font-family:var(--jjk-font-mono);font-size:10px;color:#3a3a5c">linear‑gradient 150° · #0e0624 → #1a0a36 → #0e0624</div>
      </div>
    </div>
  </div>
</div></body></html>
