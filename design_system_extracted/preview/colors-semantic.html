<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:rgba(34,197,94,0.1);border:1.5px solid rgba(34,197,94,0.28)">
      <div class="top"><span class="name" style="color:#22c55e">success</span><span class="hex" style="color:#22c55e">#22c55e</span></div>
      <div class="role" style="color:#22c55e">Keep button, ✓ pass available</div>
    </div>
    <div class="swatch" style="background:rgba(239,68,68,0.07);border:1.5px solid rgba(239,68,68,0.2)">
      <div class="top"><span class="name" style="color:#ef4444">danger</span><span class="hex" style="color:#ef4444">#ef4444</span></div>
      <div class="role" style="color:#ef4444">Pass button, ⚡ pass used</div>
    </div>
    <div class="swatch" style="background:rgba(220,38,38,0.18)">
      <div class="top"><span class="name" style="color:#f87171">danger-deep</span><span class="hex" style="color:#f87171">#dc2626</span></div>
      <div class="role" style="color:#f87171">Curse faction, destructive emphasis</div>
    </div>
    <div class="swatch" style="background:rgba(59,130,246,0.18)">
      <div class="top"><span class="name" style="color:#60a5fa">info</span><span class="hex" style="color:#60a5fa">#3b82f6</span></div>
      <div class="role" style="color:#60a5fa">Curse Energy orb, Tokyo</div>
    </div>
  </div>
</div></body></html>
