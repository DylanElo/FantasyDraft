<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px">
    <div class="swatch" style="background:#0e0e26">
      <div style="font-size:18px;font-weight:700;color:#f0f0ff">The strongest jujutsu sorcerer</div>
      <div class="mono" style="margin-top:8px">text · #f0f0ff</div>
    </div>
    <div class="swatch" style="background:#0e0e26">
      <div style="font-size:18px;font-weight:500;color:#6b7094">Build your cursed team</div>
      <div class="mono" style="margin-top:8px">muted · #6b7094</div>
    </div>
    <div class="swatch" style="background:#0e0e26">
      <div style="font-size:18px;font-weight:500;color:#3a3a5c">Enter name…</div>
      <div class="mono" style="margin-top:8px">dim · #3a3a5c</div>
    </div>
  </div>
  <div class="row" style="gap:14px;margin-top:14px">
    <div class="swatch" style="background:#0e0e26">
      <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff 20%,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">JJK</div>
      <div class="mono" style="margin-top:8px">gradient-purple · logo</div>
    </div>
    <div class="swatch" style="background:#0e0e26">
      <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff 30%,#fcd34d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Megumi</div>
      <div class="mono" style="margin-top:8px">gradient-gold · winner</div>
    </div>
  </div>
</div></body></html>
