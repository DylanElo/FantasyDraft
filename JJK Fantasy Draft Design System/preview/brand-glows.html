<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.frame { background:#07071a; border-radius:14px; border:1px solid var(--jjk-border); padding:20px; position:relative; overflow:hidden; height:140px; }
.frame .bg-glow { position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none; }
.label-corner { position:relative; z-index:2; font-family:'Cinzel',serif; font-weight:900; font-size:16px; color:#f0f0ff; }
.label-meta { position:relative; z-index:2; font-family:var(--jjk-font-mono); font-size:9px; color:#6b7094; margin-top:6px; line-height:1.5; }
</style>
</head><body>
<div class="card" style="padding:18px 32px">
  <div class="row" style="gap:10px">
    <div class="frame" style="flex:1">
      <div class="bg-glow" style="background:rgba(124,58,237,0.4);width:200px;height:200px;top:-60px;left:-30px"></div>
      <div class="label-corner">Setup</div>
      <div class="label-meta">purple 360px<br>top -80 left -60</div>
    </div>
    <div class="frame" style="flex:1">
      <div class="bg-glow" style="background:rgba(220,38,38,0.4);width:180px;height:180px;bottom:-40px;right:-30px"></div>
      <div class="label-corner">Draft</div>
      <div class="label-meta">red 280px<br>bottom 60 right -40</div>
    </div>
    <div class="frame" style="flex:1">
      <div class="bg-glow" style="background:rgba(245,158,11,0.4);width:220px;height:220px;top:-50px;left:50%;transform:translateX(-50%)"></div>
      <div class="label-corner">Results</div>
      <div class="label-meta">gold 400px<br>top -40 center</div>
    </div>
  </div>
</div></body></html>
