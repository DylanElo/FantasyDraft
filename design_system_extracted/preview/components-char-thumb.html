<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.thumb { position:relative; background:#0e0e26; border-radius:12px; overflow:hidden; border:1.5px solid rgba(255,255,255,0.08); width:140px; }
.thumb.faction-tokyo { border-color:rgba(59,130,246,0.5); }
.thumb.faction-curse { border-color:rgba(220,38,38,0.5); }
.thumb.faction-cull  { border-color:rgba(245,158,11,0.5); }
.thumb-art { aspect-ratio:3/4; background:#161630 center top/cover no-repeat; position:relative; }
.thumb-art::after { content:''; position:absolute; bottom:0; left:0; right:0; height:65%; background:linear-gradient(transparent, rgba(14,14,38,0.97)); }
.thumb-info { position:absolute; bottom:0; left:0; right:0; padding:8px 10px; z-index:1; }
.thumb-name { font-family:'Inter',sans-serif; font-weight:800; font-size:11.5px; line-height:1.3; }
.thumb-faction { font-size:9px; color:#6b7094; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
</style>
</head><body>
<div class="card">
  <div class="row" style="gap:14px;align-items:flex-start">
    <div class="thumb faction-tokyo">
      <div class="thumb-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/e/ef/Satoru_Gojo_%28Anime_2%29.png/revision/latest?cb=20250726003655')">
        <div class="thumb-info"><div class="thumb-name">Satoru Gojo</div><div class="thumb-faction">Tokyo</div></div>
      </div>
    </div>
    <div class="thumb faction-curse">
      <div class="thumb-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/3/35/Yuji_Itadori_%28Anime_4%29.png/revision/latest?cb=20251230155050')">
        <div class="thumb-info"><div class="thumb-name">Yuji Itadori</div><div class="thumb-faction">Vessel</div></div>
      </div>
    </div>
    <div class="thumb faction-cull">
      <div class="thumb-art" style="background-image:url('https://static.wikia.nocookie.net/jujutsu-kaisen/images/6/6e/Megumi_Fushiguro_%28Anime_4%29.png/revision/latest?cb=20251230155327')">
        <div class="thumb-info"><div class="thumb-name">Megumi Fushiguro</div><div class="thumb-faction">Tokyo</div></div>
      </div>
    </div>
    <div style="flex:1;font-size:11px;color:#6b7094;line-height:1.5">
      <strong style="color:#f0f0ff;font-weight:700;display:block;margin-bottom:6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase">Character thumb</strong>
      3:4 art • bottom 65% gradient fade • faction‑colored 1.5px border • Cinzel name with faction subtitle. Tap to open detail sheet.
    </div>
  </div>
</div></body></html>
