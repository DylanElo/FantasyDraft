<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.r-cell { flex:1; display:flex; flex-direction:column; gap:8px; align-items:center; }
.r-box { width: 64px; height: 64px; background:#161630; border:1.5px solid rgba(255,255,255,0.15); }
.r-name { font-size: 11px; font-weight: 700; color:#f0f0ff; }
.r-meta { font-family: var(--jjk-font-mono); font-size: 9px; color: var(--jjk-muted); }
</style>
</head><body>
<div class="card">
  <div class="row" style="gap:6px">
    <div class="r-cell"><div class="r-box" style="border-radius:4px"></div><div class="r-name">xs</div><div class="r-meta">4px · chips</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:10px"></div><div class="r-name">sm</div><div class="r-meta">10px · icon btn</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:12px"></div><div class="r-name">md</div><div class="r-meta">12px · inputs</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:14px"></div><div class="r-name">lg</div><div class="r-meta">14px · CTA</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:18px"></div><div class="r-name">xl</div><div class="r-meta">18px · char card</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:20px"></div><div class="r-name">2xl</div><div class="r-meta">20px · sheets</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:24px"></div><div class="r-name">3xl</div><div class="r-meta">24px · logo tile</div></div>
    <div class="r-cell"><div class="r-box" style="border-radius:100px"></div><div class="r-name">pill</div><div class="r-meta">100px · badges</div></div>
  </div>
</div></body></html>
