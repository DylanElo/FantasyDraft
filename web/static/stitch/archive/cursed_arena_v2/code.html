<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;

            direction: ltr;

        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.8); }
        }
        .intent-glow { animation: pulse-glow 2s infinite; border: 1px solid theme('colors.blood-crimson'); }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-effect::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.05) 51%, transparent 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        /* Foil Effect for active buttons */
        .foil-sweep {
            position: relative;
            overflow: hidden;
        }
        .foil-sweep::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: theme('colors.holographic-foil');
            opacity: 0.15;
            transform: rotate(45deg);
            animation: sweep 3s infinite linear;
            pointer-events: none;
        }
        @keyframes sweep {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* 3D Orb */
        .energy-orb {
            border-radius: 50%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.4);
            position: relative;
        }
        .energy-orb::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%;
            width: 30%; height: 30%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent);
        }
    </style>
