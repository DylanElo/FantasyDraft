<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.standing-row { background:#0e0e26; border:1px solid var(--jjk-border); border-radius:14px; padding:14px; display:flex; gap:12px; align-items:flex-start; }
.standing-row.first { border-color:rgba(245,158,11,0.42); box-shadow:0 0 20px rgba(245,158,11,0.07); }
.stand-rank { font-size:26px; flex-shrink:0; width:34px; text-align:center; }
.stand-name { font-family:'Cinzel',serif; font-size:14px; font-weight:800; }
.stand-pts { font-size:11px; color:#a855f7; margin-top:2px; }
.stand-team { font-size:11px; color:#6b7094; margin-top:6px; line-height:1.6; }
</style>
</head><body>
<div class="card">
  <div class="bg-glow" style="background:rgba(245,158,11,0.35);width:280px;height:280px;top:-80px;left:50%;transform:translateX(-50%);opacity:0.4"></div>
  <div class="row" style="gap:14px;align-items:center">
    <div style="text-align:center">
      <div style="font-size:54px">🏆</div>
      <div style="font-family:'Cinzel',serif;font-size:22px;font-weight:900;margin-top:4px;background:linear-gradient(135deg,#fff 30%,#fcd34d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Gojo</div>
      <div style="font-size:11px;color:#6b7094;margin-top:2px">Wins the Draft</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div class="standing-row first">
        <div class="stand-rank">🥇</div>
        <div style="flex:1">
          <div class="stand-name">Gojo</div>
          <div class="stand-pts">48 pts</div>
          <div class="stand-team">Sukuna · Toji · Yuta · Hakari · Megumi</div>
        </div>
      </div>
      <div class="standing-row">
        <div class="stand-rank">🥈</div>
        <div style="flex:1">
          <div class="stand-name">Megumi</div>
          <div class="stand-pts">42 pts</div>
          <div class="stand-team">Yuji · Nanami · Maki · Hanami · Choso</div>
        </div>
      </div>
    </div>
  </div>
</div></body></html>
