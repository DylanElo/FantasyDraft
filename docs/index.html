<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07071a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>JJK Fantasy Draft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── SETUP ── -->
  <section id="setup" class="screen active">
    <div class="bg-glow bg-glow-purple"></div>
    <div class="bg-glow bg-glow-red"></div>
    <div class="setup-scroll">
      <div class="setup-inner">
        <div class="logo-block">
          <div class="logo-kanji">呪</div>
          <div class="logo-jjk">JJK</div>
          <div class="logo-sub">FANTASY DRAFT</div>
          <p class="logo-tagline">Build your cursed team</p>
        </div>
        <div class="setup-form">
          <div class="form-group">
            <div class="form-label">Players</div>
            <div class="count-row" id="count-row">
              <button class="count-btn active" data-n="2">2</button>
              <button class="count-btn" data-n="3">3</button>
              <button class="count-btn" data-n="4">4</button>
            </div>
          </div>
          <div id="name-inputs"></div>
          <button id="btn-start" class="btn-primary">
            Begin Draft
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
          <button id="btn-browse-open" class="btn-ghost">Browse Characters</button>
        </div>
        <div class="energy-legend">
          <div class="legend-title">Energy types</div>
          <div class="legend-row">
            <span class="orb orb-green"></span> Physical &nbsp;
            <span class="orb orb-red"></span> Bloodline &nbsp;
            <span class="orb orb-blue"></span> Curse Energy &nbsp;
            <span class="orb orb-white"></span> Strategic &nbsp;
            <span class="orb orb-black"></span> General
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── DRAFT ── -->
  <section id="draft" class="screen">
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">呪</span>
        <span class="header-title">Fantasy Draft</span>
      </div>
      <div class="header-right">
        <div class="round-badge" id="round-badge">R1 / 5</div>
        <button class="icon-btn" id="btn-teams-open" aria-label="View teams">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="turn-bar">
      <div class="turn-avatar" id="turn-avatar">?</div>
      <div class="turn-text">
        <div class="turn-name" id="turn-name">—</div>
        <div class="turn-hint" id="turn-hint">Waiting…</div>
      </div>
      <div class="turn-pips" id="turn-pips"></div>
    </div>

    <div class="draft-body">
      <div id="draw-state" class="draw-state">
        <div class="face-down" id="face-down">
          <div class="face-kanji">呪</div>
          <div class="face-label">TAP TO DRAW</div>
        </div>
      </div>
      <div id="decide-state" class="decide-state hidden">
        <div id="card-slot"></div>
      </div>
    </div>

    <div class="action-bar">
      <button id="btn-draw"  class="action-btn btn-draw">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.34"/></svg>
        Draw
      </button>
      <button id="btn-keep"  class="action-btn btn-keep hidden">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Keep
      </button>
      <button id="btn-pass"  class="action-btn btn-pass hidden">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Pass
      </button>
    </div>
  </section>

  <!-- ── RESULTS ── -->
  <section id="results" class="screen">
    <div class="bg-glow bg-glow-gold"></div>
    <div class="results-scroll">
      <div class="results-inner">
        <div class="trophy-block">
          <div class="trophy">🏆</div>
          <h2 class="winner-name" id="winner-name">—</h2>
          <p class="winner-sub">Wins the Draft!</p>
        </div>
        <div class="standings" id="standings"></div>
        <button id="btn-new-game" class="btn-primary">Play Again</button>
      </div>
    </div>
  </section>

  <!-- ── BROWSE ── -->
  <section id="browse" class="screen">
    <header class="app-header">
      <button class="icon-btn" id="btn-browse-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="header-title">Characters</span>
      <div style="width:40px"></div>
    </header>
    <div class="faction-bar" id="faction-bar">
      <button class="f-tab active" data-f="all">All</button>
      <button class="f-tab" data-f="tokyo">Tokyo</button>
      <button class="f-tab" data-f="kyoto">Kyoto</button>
      <button class="f-tab" data-f="other">Sorcerer</button>
      <button class="f-tab" data-f="villain">Villain</button>
      <button class="f-tab" data-f="curse">Curse</button>
      <button class="f-tab" data-f="culling">Culling</button>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </section>

  <!-- ── TEAMS PANEL ── -->
  <div class="slide-panel" id="teams-panel">
    <div class="panel-handle"></div>
    <div class="panel-head">
      <span>All Teams</span>
      <button class="icon-btn" id="btn-teams-close">✕</button>
    </div>
    <div class="panel-tabs" id="panel-tabs"></div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- ── CHAR MODAL ── -->
  <div id="char-modal" class="char-modal hidden">
    <div class="char-modal-sheet" id="char-modal-sheet"></div>
  </div>

  <!-- SCRIM -->
  <div class="scrim hidden" id="scrim"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="characters_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
