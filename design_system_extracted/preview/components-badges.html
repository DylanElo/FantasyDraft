<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.fbadge { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:100px; display:inline-block; }
.fbadge-tokyo   { background:rgba(59,130,246,0.18); color:#60a5fa; }
.fbadge-kyoto   { background:rgba(6,182,212,0.18);  color:#22d3ee; }
.fbadge-sorc    { background:rgba(139,92,246,0.18); color:#c084fc; }
.fbadge-villain { background:rgba(239,68,68,0.18);  color:#f87171; }
.fbadge-curse   { background:rgba(220,38,38,0.18);  color:#f87171; }
.fbadge-cull    { background:rgba(245,158,11,0.18); color:#fbbf24; }
.round-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:100px; background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.4); color:#a855f7; display:inline-block; }
.toast { display:inline-block; background:rgba(14,14,38,0.96); border:1px solid rgba(255,255,255,0.15); border-radius:100px; padding:10px 20px; font-size:13px; backdrop-filter: blur(12px); }
</style>
</head><body>
<div class="card">
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <span class="fbadge fbadge-tokyo">Tokyo</span>
    <span class="fbadge fbadge-kyoto">Kyoto</span>
    <span class="fbadge fbadge-sorc">Sorcerer</span>
    <span class="fbadge fbadge-villain">Villain</span>
    <span class="fbadge fbadge-curse">Curse</span>
    <span class="fbadge fbadge-cull">Culling</span>
  </div>
  <div style="display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap">
    <span class="round-badge">R3 / 5</span>
    <span class="toast">Yuji kept Black Flash.</span>
    <span style="font-size:11px;color:#22c55e">✓ Pass available</span>
    <span style="font-size:11px;color:#ef4444">⚡ Pass used</span>
  </div>
</div></body></html>
