<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; font-family:'Inter',sans-serif; font-weight:700; cursor:pointer; border:none; }
.btn-primary { height:56px; padding:0 24px; background:#7c3aed; color:#fff; border-radius:14px; font-size:16px; box-shadow:0 8px 32px rgba(124,58,237,0.35); }
.btn-ghost { height:52px; padding:0 22px; background:transparent; color:#6b7094; border:1.5px solid rgba(255,255,255,0.08); border-radius:14px; font-size:15px; font-weight:600; }
.btn-keep { height:52px; padding:0 18px; background:rgba(34,197,94,0.1); color:#22c55e; border:1.5px solid rgba(34,197,94,0.28); border-radius:12px; font-size:12px; font-weight:700; flex-direction:column; gap:3px; min-width: 110px; }
.btn-pass { height:52px; padding:0 18px; background:rgba(239,68,68,0.07); color:#ef4444; border:1.5px solid rgba(239,68,68,0.2); border-radius:12px; font-size:12px; font-weight:700; flex-direction:column; gap:3px; min-width: 110px; }
.btn-draw-action { height:52px; padding:0 18px; background:#7c3aed; color:#fff; border-radius:12px; font-size:12px; font-weight:700; flex-direction:column; gap:3px; min-width: 110px; box-shadow:0 4px 22px rgba(124,58,237,0.35); }
</style>
</head><body>
<div class="card">
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-primary">Begin Draft
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
    <button class="btn btn-ghost">Browse Characters</button>
  </div>
  <div class="row" style="gap:10px;margin-top:14px">
    <button class="btn btn-draw-action">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.34"/></svg>
      Draw
    </button>
    <button class="btn btn-keep">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Keep
    </button>
    <button class="btn btn-pass">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Pass
    </button>
  </div>
</div></body></html>
