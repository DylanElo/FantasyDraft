<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F4EC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="data:,">
  <title>JJK Arena | Cursed Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=IBM+Plex+Mono:wght@500;600;700&family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='phaser-shell.css') }}?v=37">
  <script src="{{ url_for('static', filename='socket.io.min.js') }}?v=4.7.2"></script>
</head>
<body>
  <main id="classic-v2" class="phaser-shell-screen" aria-label="Cursed Clash Phaser game shell">
    <div id="v2-phaser-shell" aria-label="Cursed Clash mobile arena">
      <section id="jjk-dom-ui" aria-label="Accessible game controls">
        <h1 id="jjk-scene-heading" class="jjk-sr-only" tabindex="-1">Loading JJK Arena</h1>
        <nav id="jjk-action-mirror" aria-labelledby="jjk-scene-heading"></nav>
        <p id="jjk-scene-live" class="jjk-sr-only" role="status" aria-live="polite" aria-atomic="true"></p>

        <section id="jjk-identity-dialog" class="jjk-identity-overlay" role="dialog" aria-modal="true" aria-labelledby="jjk-identity-title" aria-describedby="jjk-identity-hint jjk-identity-error" aria-hidden="true" hidden>
          <form id="jjk-identity-form" class="jjk-identity-card" novalidate>
            <span class="jjk-identity-kicker">PLAYER IDENTITY // LOCAL DEVICE</span>
            <h2 id="jjk-identity-title">EDIT PLAYER NAME</h2>
            <label id="jjk-identity-label" for="jjk-identity-input">Player name</label>
            <input id="jjk-identity-input" name="identity" type="text" maxlength="32" enterkeyhint="done" autocomplete="nickname" aria-describedby="jjk-identity-hint jjk-identity-error" required>
            <p id="jjk-identity-hint">Enter the identity shown in the arena.</p>
            <p id="jjk-identity-error" class="jjk-identity-error" role="status" aria-live="polite" aria-atomic="true"></p>
            <div class="jjk-identity-actions">
              <button id="jjk-identity-cancel" type="button">CANCEL</button>
              <button id="jjk-identity-save" type="submit">SAVE</button>
            </div>
          </form>
        </section>
      </section>
    </div>
    <div id="connection-status" class="jjk-sr-only" role="status" aria-live="polite" aria-atomic="true">Connecting</div>
    <div id="toast" class="jjk-sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script>
    const PLAYER_SESSION_ID = "{{ player_id }}";
    const BATTLE_V2_ENABLED = {{ 'true' if battle_v2_enabled else 'false' }};
    const BATTLE_V2_STARTER_ROSTER = {{ battle_v2_catalog | tojson }};
    const FIRST_CREATION = {{ first_creation | tojson }};
    window.JJK_BOOTSTRAP = {
      playerId: PLAYER_SESSION_ID,
      battleV2Enabled: BATTLE_V2_ENABLED,
      roster: BATTLE_V2_STARTER_ROSTER,
      firstCreation: FIRST_CREATION,
    };
  </script>
  <script src="{{ url_for('static', filename='vendor/phaser.min.js') }}?v=3.90.0"></script>
  <script src="{{ url_for('static', filename='phaser-design-tokens.js') }}?v=37"></script>
  <script src="{{ url_for('static', filename='phaser-shell.js') }}?v=37"></script>
</body>
</html>
