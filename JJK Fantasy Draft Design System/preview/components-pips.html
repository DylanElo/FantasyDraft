<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.pip-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:#0e0e26; border:1px solid var(--jjk-border); border-radius:12px; }
.pip-avatar { width:34px; height:34px; background:#7c3aed; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; box-shadow:0 0 12px rgba(124,58,237,0.35); flex-shrink:0; }
.pip-name { font-family:'Cinzel',serif; font-size:13px; font-weight:900; color:#fcd34d; flex:1; }
.pip-pips { display:flex; gap:4px; }
.pip { width:10px; height:10px; border-radius:50%; background:#161630; border:1.5px solid rgba(255,255,255,0.08); }
.pip.done { background:#7c3aed; border-color:#7c3aed; box-shadow:0 0 6px rgba(124,58,237,0.35); }
</style>
</head><body>
<div class="card">
  <div class="col" style="gap:8px">
    <div class="pip-row">
      <div class="pip-avatar">G</div>
      <div class="pip-name">Gojo</div>
      <div class="pip-pips"><div class="pip done"></div><div class="pip done"></div><div class="pip done"></div><div class="pip"></div><div class="pip"></div></div>
    </div>
    <div class="pip-row">
      <div class="pip-avatar" style="background:#5b21b6;box-shadow:none">M</div>
      <div class="pip-name" style="color:#6b7094;text-shadow:none">Megumi</div>
      <div class="pip-pips"><div class="pip done"></div><div class="pip done"></div><div class="pip"></div><div class="pip"></div><div class="pip"></div></div>
    </div>
  </div>
</div></body></html>
