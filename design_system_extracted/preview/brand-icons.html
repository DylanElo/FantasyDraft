<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.icon-cell { flex:1; padding:14px 8px; background:#0e0e26; border:1px solid var(--jjk-border); border-radius:12px; display:flex; flex-direction:column; align-items:center; gap:8px; color:#f0f0ff; }
.icon-cell svg { stroke: #a855f7; }
.icon-name { font-size:10px; color:#6b7094; }
</style>
</head><body>
<div class="card">
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.34"/></svg><div class="icon-name">draw</div></div>
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><div class="icon-name">keep</div></div>
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><div class="icon-name">pass / close</div></div>
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><div class="icon-name">teams</div></div>
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><div class="icon-name">arrow-right</div></div>
    <div class="icon-cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><div class="icon-name">arrow-left</div></div>
    <div class="icon-cell"><span style="font-family:'Cinzel',serif;font-size:28px;color:#a855f7">呪</span><div class="icon-name">brand mark</div></div>
  </div>
  <div style="font-family:var(--jjk-font-mono);font-size:9px;color:#6b7094;margin-top:12px">Lucide / Feather family · 2–2.5px stroke · round caps + joins · currentColor</div>
</div></body></html>
