<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F4EC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="data:,">
  <title>JJK Arena | Cursed Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=IBM+Plex+Mono:wght@500;600;700&family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='phaser-shell.css') }}?v=28">
  <script src="{{ url_for('static', filename='socket.io.min.js') }}?v=4.7.2"></script>
</head>
<body>
  <main id="classic-v2" class="phaser-shell-screen" aria-label="Cursed Clash Phaser game shell">
    <div id="v2-phaser-shell" aria-label="Cursed Clash mobile arena"></div>
    <div id="connection-status" hidden>Connecting</div>
    <div id="toast" hidden></div>
  </main>

  <script>
    const PLAYER_SESSION_ID = "{{ player_id }}";
    const BATTLE_V2_ENABLED = {{ 'true' if battle_v2_enabled else 'false' }};
    const BATTLE_V2_STARTER_ROSTER = {{ battle_v2_catalog | tojson }};
    const FIRST_CREATION = {{ first_creation | tojson }};
    window.JJK_BOOTSTRAP = {
      playerId: PLAYER_SESSION_ID,
      battleV2Enabled: BATTLE_V2_ENABLED,
      roster: BATTLE_V2_STARTER_ROSTER,
      firstCreation: FIRST_CREATION,
    };
  </script>
  <script src="{{ url_for('static', filename='vendor/phaser.min.js') }}?v=3.90.0"></script>
  <script src="{{ url_for('static', filename='phaser-design-tokens.js') }}?v=28"></script>
  <script src="{{ url_for('static', filename='phaser-shell.js') }}?v=28"></script>
</body>
</html>
