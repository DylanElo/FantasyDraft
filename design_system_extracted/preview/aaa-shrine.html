<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.shrine-stage {
  position: relative; width: 100%; height: 200px; border-radius: 14px;
  overflow: hidden; flex-shrink: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.22), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(220,38,38,0.14), transparent 55%),
    linear-gradient(180deg, #07071a 0%, #050513 100%);
  border: 1px solid var(--jjk-border);
}
.shrine-torii {
  position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
  width: 200px; height: 100px;
  background:
    linear-gradient(#0a0a1f, #0a0a1f) center/100% 18px no-repeat,
    linear-gradient(#0a0a1f, #0a0a1f) center top/100% 5px no-repeat,
    linear-gradient(#0a0a1f, #0a0a1f) 18% bottom/12px 80px no-repeat,
    linear-gradient(#0a0a1f, #0a0a1f) 82% bottom/12px 80px no-repeat;
  filter: blur(0.5px);
  opacity: 0.85;
}
.shrine-candle {
  position: absolute; bottom: 28%;
  width: 12px; height: 18px; border-radius: 50% 50% 40% 40%;
  background: radial-gradient(circle at 50% 35%, #fcd34d, #f59e0b 50%, transparent 75%);
  box-shadow: 0 0 22px 5px rgba(245,158,11,0.45), 0 0 50px 15px rgba(245,158,11,0.2);
  animation: candleFlicker 2.8s ease-in-out infinite;
}
.shrine-candle.left  { left: 18%; }
.shrine-candle.right { right: 18%; animation-delay: -1.2s; }
@keyframes candleFlicker {
  0%, 100% { opacity: 0.95; transform: scale(1); }
  20%      { opacity: 0.7; transform: scale(0.92); }
  50%      { opacity: 1; transform: scale(1.05); }
  70%      { opacity: 0.85; transform: scale(0.98); }
}
.shrine-ember {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: rgba(167,139,250,0.85);
  box-shadow: 0 0 6px rgba(124,58,237,0.7);
  animation: emberFloat linear infinite;
}
@keyframes emberFloat {
  from { transform: translateY(0); opacity: 0; }
  10%  { opacity: 0.9; }
  90%  { opacity: 0.6; }
  to   { transform: translateY(-220px); opacity: 0; }
}
</style>
</head><body>
<div class="card" style="padding:18px 32px">
  <div class="shrine-stage">
    <div class="shrine-torii"></div>
    <div class="shrine-candle left"></div>
    <div class="shrine-candle right"></div>
    <div class="shrine-ember" style="left:10%; bottom:0; animation-duration:6s"></div>
    <div class="shrine-ember" style="left:32%; bottom:0; animation-duration:7s; animation-delay:1.5s"></div>
    <div class="shrine-ember" style="left:48%; bottom:0; animation-duration:5.5s; animation-delay:3s"></div>
    <div class="shrine-ember" style="left:64%; bottom:0; animation-duration:6.5s; animation-delay:2s"></div>
    <div class="shrine-ember" style="left:84%; bottom:0; animation-duration:7.5s; animation-delay:0.5s"></div>
  </div>
  <div style="font-size:11px;color:#6b7094;line-height:1.5;margin-top:10px;text-align:center">
    Lobby background: dim torii silhouette + two flickering candles + 18 rising purple embers · all parallax 14px × layer depth on mousemove
  </div>
</div></body></html>
