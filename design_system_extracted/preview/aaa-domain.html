<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Yuji+Mai&display=swap" rel="stylesheet">
<style>
.domain-stage {
  position: relative; width: 220px; height: 220px; border-radius: 14px;
  background: #07071a;
  overflow: hidden; flex-shrink: 0;
  border: 1px solid var(--jjk-border);
}
.domain-stage::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(220,38,38,0.35) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.6) 80%, #000 100%);
  animation: domainPulse 2.8s ease-in-out infinite;
}
.domain-stage::after {
  content: '領域展開'; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Yuji Mai', 'Cinzel', serif;
  font-size: 28px; color: #fff;
  text-shadow: 0 0 12px rgba(220,38,38,0.8), 0 0 30px rgba(124,58,237,0.5);
  writing-mode: vertical-rl;
  letter-spacing: 0.1em;
  animation: domainPulse 2.8s ease-in-out infinite;
}
@keyframes domainPulse {
  0%, 100% { opacity: 0.45; transform: translate(-50%,-50%) scale(0.85); }
  50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.05); }
}
.domain-stage::before { animation: domainBgPulse 2.8s ease-in-out infinite; transform: none; }
@keyframes domainBgPulse {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 1; }
}
</style>
</head><body>
<div class="card" style="padding:18px 32px">
  <div class="row" style="gap:24px;align-items:center">
    <div class="domain-stage"></div>
    <div style="flex:1">
      <div style="font-family:'Cinzel',serif;font-weight:900;font-size:16px;color:#f0f0ff">Domain Expansion curtain</div>
      <div style="font-size:11px;color:#6b7094;line-height:1.6;margin-top:8px">
        On ultimate skill cast: a red‑tinted radial curtain implodes from center while the kanji <strong>領域展開</strong> appears in vertical writing (<code style="background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:3px;font-family:var(--jjk-font-mono)">writing-mode: vertical-rl</code>). 900ms total; pairs with sub‑bass + screen shake.
        <div style="font-family:var(--jjk-font-mono);font-size:10px;color:#3a3a5c;margin-top:6px">font · Yuji Mai · scale 0.5 → 1 → 1.4</div>
      </div>
    </div>
  </div>
</div></body></html>
