<!-- @dsCard group="Colors" viewport="700x170" name="Energy Types" subtitle="B / T / F / C / X — the five tactical energy colors" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<style>body{display:flex;gap:14px;padding:20px;background:var(--surface-app);align-items:center;justify-content:center;}
.e{display:flex;flex-direction:column;align-items:center;gap:8px;}
.orb{width:56px;height:56px;border-radius:50%;border:2px solid rgba(0,0,0,0.45);}
.lbl{font-family:var(--font-ui);font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-on-dark-dim);}</style></head><body>
<div class="e"><div class="orb" style="background:radial-gradient(circle at 30% 28%, #9fe6b8, var(--e-body) 45%, #1c6b3a);box-shadow:0 0 14px rgba(63,190,107,0.5)"></div><span class="lbl">B · Body</span></div>
<div class="e"><div class="orb" style="background:radial-gradient(circle at 30% 28%, #9dbcff, var(--e-technique) 45%, #1a3a8f);box-shadow:0 0 14px rgba(61,123,255,0.5)"></div><span class="lbl">T · Technique</span></div>
<div class="e"><div class="orb" style="background:radial-gradient(circle at 30% 28%, #ffe6a8, var(--e-focus) 45%, #8a5a12);box-shadow:0 0 14px rgba(251,191,66,0.5)"></div><span class="lbl">F · Focus</span></div>
<div class="e"><div class="orb" style="background:radial-gradient(circle at 30% 28%, #ff8b9c, var(--e-curse) 45%, #6e1020);box-shadow:0 0 14px rgba(216,32,59,0.5)"></div><span class="lbl">C · Curse</span></div>
<div class="e"><div class="orb" style="background:radial-gradient(circle at 30% 28%, #7a6b99, var(--e-wild) 45%, #16121f)"></div><span class="lbl">X · Wild</span></div>
</body></html>
