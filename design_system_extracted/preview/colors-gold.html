<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="bg-glow" style="background:#f59e0b;width:260px;height:260px;top:-90px;left:50%;transform:translateX(-50%);opacity:0.12"></div>
  <div class="row">
    <div class="swatch" style="background:#f59e0b">
      <div class="top"><span class="name">gold</span><span class="hex">#f59e0b</span></div>
      <div class="role" style="color:rgba(0,0,0,0.65)">Results screen / winner / trophy</div>
    </div>
    <div class="swatch" style="background:#fcd34d">
      <div class="top"><span class="name" style="color:#1a1a1a">gold-hi</span><span class="hex" style="color:#1a1a1a">#fcd34d</span></div>
      <div class="role" style="color:rgba(0,0,0,0.65)">Gradient stop on winner name</div>
    </div>
    <div class="swatch" style="background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.42)">
      <div class="top"><span class="name" style="color:#fcd34d">gold-glow</span><span class="hex" style="color:#fcd34d">35% α</span></div>
      <div class="role" style="color:#fcd34d">1st‑place row halo</div>
    </div>
  </div>
  <div class="label" style="margin-top:14px;font-size:9px;color:#6b7094">Use sparingly — gold appears only on results, the active player's name, and rare reward moments. Never on chrome.</div>
</div></body></html>
